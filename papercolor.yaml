esphome:
  name: papercolor
  friendly_name: M5Stack PaperColor
  on_boot:
    # ── M5PM1 PMIC boot sequence (priority 800) ───────────────────────────────
    # The M5PM1 is a custom power management IC that controls the EPD power rail.
    # By default at power-on, the EPD rail is OFF — the display will not respond
    # to any SPI commands until the rail is enabled.
    #
    # This lambda runs at priority 800 (early boot), which is AFTER the I2C bus
    # is initialized (priority 900) but BEFORE the epaper_spi display component
    # sets up (priority 500). This ordering is critical — if the display tries to
    # initialize before the EPD rail is on, it will hang waiting for the BUSY pin.
    #
    # The register sequence below is derived from the M5Stack factory firmware HAL:
    #   https://github.com/m5stack/M5PaperColor-UserDemo/blob/main/main/hal/hal.cpp
    # and the M5GFX library source. It is equivalent to calling:
    #   pm1.pinMode(EPD_EN, OUTPUT);    // EPD_EN = M5PM1 GPIO0
    #   pm1.digitalWrite(EPD_EN, HIGH); // enable EPD power rail
    #   pm1.setChargeEnable(true);      // PWR_CFG reg 0x06 bit 0
    #   pm1.setBoostEnable(true);       // PWR_CFG reg 0x06 bit 3 — generates
    #                                   // high-voltage rails (~15V) needed for
    #                                   // e-paper pixel switching
    #
    # We use ESPHome's native I2C bus API (id(i2c_bus)) rather than Arduino Wire
    # because the combined arduino/espidf framework does not expose Wire in the
    # ESPHome lambda scope.
    #
    # M5PM1 I2C address: 0x6E. Chip ID register 0x00 must return 0x50.
    - priority: 800.0
      then:
        - lambda: |-
            delay(200);
            auto *bus = id(i2c_bus);
            const uint8_t addr = 0x6E;

            ESP_LOGI("M5PM1", "Starting M5PM1 init...");

            uint8_t reg = 0x00, chip_id = 0;
            auto write_err = bus->write(addr, &reg, 1, false);
            auto read_err = bus->read(addr, &chip_id, 1);

            ESP_LOGI("M5PM1", "Write err: %d, Read err: %d, Chip ID: 0x%02X", (int)write_err, (int)read_err, chip_id);

            if (chip_id != 0x50) {
              ESP_LOGE("M5PM1", "Unexpected chip ID: 0x%02X (expected 0x50)", chip_id);
              return;
            }

            { uint8_t d[2] = {0x0A, 0x00}; bus->write(addr, d, 2); }

            // GPIO function select — set GPIO0 and GPIO3 to plain GPIO mode (reg 0x16)
            { uint8_t r = 0x16, v = 0; bus->write(addr, &r, 1, false); bus->read(addr, &v, 1);
              uint8_t d[2] = {r, uint8_t(v & ~((1<<0) | (1<<3)))}; bus->write(addr, d, 2); }

            // GPIO direction — set GPIO0 (EPD) and GPIO3 (SD) as outputs (reg 0x10)
            { uint8_t r = 0x10, v = 0; bus->write(addr, &r, 1, false); bus->read(addr, &v, 1);
              uint8_t d[2] = {r, uint8_t(v | (1<<0) | (1<<3))}; bus->write(addr, d, 2); }

            // GPIO push-pull mode — disable open-drain on GPIO0 and GPIO3 (reg 0x13)
            { uint8_t r = 0x13, v = 0; bus->write(addr, &r, 1, false); bus->read(addr, &v, 1);
              uint8_t d[2] = {r, uint8_t(v & ~((1<<0) | (1<<3)))}; bus->write(addr, d, 2); }

            // GPIO output HIGH — enable EPD (GPIO0) and SD (GPIO3) power rails (reg 0x11)
            { uint8_t r = 0x11, v = 0; bus->write(addr, &r, 1, false); bus->read(addr, &v, 1);
              uint8_t d[2] = {r, uint8_t(v | (1<<0) | (1<<3))}; bus->write(addr, d, 2); }

            // PWR_CFG (0x06): enable charging (bit0), 5V DCDC (bit1), 3.3V LDO (bit2),
            // boost converter (bit3) — auto-clear on reset so must be set every boot
            { uint8_t r = 0x06, v = 0; bus->write(addr, &r, 1, false); bus->read(addr, &v, 1);
              uint8_t d[2] = {r, uint8_t(v | (1<<0) | (1<<1) | (1<<2) | (1<<3))}; bus->write(addr, d, 2); }
            ESP_LOGI("M5PM1", "Charge + DCDC + LDO + Boost enabled");

            // HOLD_CFG (0x07): maintain EPD (bit0), SD (bit3), and 3.3V (bit5) rails
            // on USB disconnect — without this the PMIC may reset when USB is unplugged
            { uint8_t r = 0x07, v = 0; bus->write(addr, &r, 1, false); bus->read(addr, &v, 1);
              uint8_t d[2] = {r, uint8_t(v | (1<<0) | (1<<3) | (1<<5))}; bus->write(addr, d, 2); }
            ESP_LOGI("M5PM1", "Power hold configured");

            // Disable PMIC I2C idle-sleep — keeps PMIC responsive during shutdown sequence
            { uint8_t d[2] = {0x09, 0x00}; bus->write(addr, d, 2); }

            // Button config — disable hardware reset functions on physical buttons
            // to prevent unintended resets (regs 0x49 and 0x4A)
            { uint8_t d[2] = {0x49, 0x00}; bus->write(addr, d, 2); }
            { uint8_t d[2] = {0x4A, 0x00}; bus->write(addr, d, 2); }

            delay(500);
            ESP_LOGI("M5PM1", "EPD power rail enabled");
    - priority: -100
      then:
        - lambda: |-
            // Brief blue boot-confirmation flash on every boot.
            // With PMIC full shutdown, all boots are cold power-on — GPIO9/Button B
            // can no longer wake the device (ESP32 is powerless during shutdown).
            // On-demand wake uses physical power button S4 (PMIC-side), which looks
            // identical to a timer wake at the ESP32 level.
            auto call = id(leds).turn_on();
            call.set_rgb(0.0f, 0.0f, 1.0f);
            call.set_brightness(0.3f);
            call.perform();
        - delay: 1s
        - light.turn_off: leds
        - script.execute: battery_watchdog
    - priority: -200
      then:
        - delay: 25s     # display hardware init takes ~19s; wait for it to complete
        - wait_until:
            condition:
              and:
                - lambda: 'return id(ha_outdoor_temp).has_state();'
                - lambda: 'return !isnan(id(local_temp).state);'
            timeout: 60s  # give up and refresh with whatever we have after 60s
        - component.update: reset_reason
        - component.update: build_date_sensor
        - component.update: battery_mv
        - if:
            condition:
              # Low battery path: triggers if voltage is valid and below threshold,
              # or if the "Simulate Low Battery" switch is on.
              # USB guard: never trigger on USB — PMIC shutdown while charging is incorrect.
              # NaN (no reading) evaluates false — safe fallback to normal path.
              lambda: |-
                if (id(usb_connected).state) return false;
                return (id(battery_mv).has_state() && id(battery_mv).state < 3350.0f)
                       || id(simulate_low_battery).state;
            then:
              # ── Low battery boot path ────────────────────────────────────────────
              # Render warning screen then issue PMIC shutdown with 7-day timer.
              # SYS_CMD_OFF cuts all rails — no need to disable them individually first.
              - lambda: |-
                  id(low_battery_triggered) = true;
                  id(initial_display_done) = true;  // prevent on_value from queuing a second refresh during our 20s EPD wait
                  ESP_LOGW("battery", "Low battery (%.0f mV) — showing warning screen", id(battery_mv).state);
              - component.update: m5_color_screen
              - script.stop: ota_led_flash
              - light.turn_off: leds
              # Wait for EPD panel refresh to complete before PMIC cuts power (~15-19s refresh)
              - delay: 20s
              # PMIC shutdown with 7-day timer — effectively indefinite.
              # User can wake manually via physical power button S4 to charge.
              - lambda: 'ESP_LOGI("sleep", "PMIC shutdown (low battery) — 7-day timer");'
              - script.execute:
                  id: pmic_shutdown
                  wake_seconds: 604800
            else:
              # ── Normal boot path ─────────────────────────────────────────────────
              - component.update: wifi_signal_db
              - if:
                  condition:
                    lambda: 'return id(ha_outdoor_temp).has_state();'
                  then:
                    - lambda: 'id(initial_display_done) = true;'
                    - logger.log: "Sensors ready — marking initial display done before refresh"
              - component.update: m5_color_screen
              - script.stop: ota_led_flash
              - light.turn_off: leds
              # 20s covers: 150ms WS2812 off-frame settle + up to ~19s Spectra E6 full refresh.
              # The EPD component.update is asynchronous — the panel refresh runs in the background
              # and takes 15–19s. We must not cut the EPD power rail until it is complete.
              - delay: 20s
              - lambda: 'id(last_usb_refresh_ms) = millis();'
              - if:
                  condition:
                    lambda: 'return id(usb_connected).state;'
                  then:
                    # USB connected — stay awake. Interval refresh handles periodic updates.
                    # Rails must remain on for display updates without rebooting.
                    - logger.log: "USB connected — staying awake (no PMIC shutdown)"
                  else:
                    # ── Battery mode: PMIC full shutdown ────────────────────────────
                    # SYS_CMD_OFF cuts all rails — no need to disable them individually.
                    # Disabling rails before shutdown would leave them off if the fail-safe
                    # aborts shutdown, degrading the device without powering it down.
                    - lambda: 'ESP_LOGI("sleep", "PMIC shutdown — wake in %.0f min", id(battery_sleep_mins).state);'
                    - script.execute:
                        id: pmic_shutdown
                        wake_seconds: !lambda 'return (uint32_t)(id(battery_sleep_mins).state * 60.0f);'

# ── Globals ───────────────────────────────────────────────────────────────────

globals:
  - id: initial_display_done
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: last_usb_refresh_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: low_battery_triggered
    type: bool
    restore_value: false
    initial_value: 'false'

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80MHz

logger:
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret papercolor_api_key

safe_mode:

ota:
  - platform: esphome
    password: !secret papercolor_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true   # skip AP scan on cold-boot wake — saves 1-3s per cycle
  # use_address: 192.168.3.x  # Uncomment and set to your device's reserved/static IP
                               # Improves OTA reliability by bypassing mDNS resolution
  ap:
    ssid: "PaperColor Fallback"
    password: !secret papercolor_ap_password

captive_portal:

# ── Time ──────────────────────────────────────────────────────────────────────

time:
  - platform: homeassistant
    id: ha_time
    timezone: "America/Los_Angeles"

# ── I2C ───────────────────────────────────────────────────────────────────────
# SDA=GPIO3, SCL=GPIO2 confirmed from M5GFX source and factory firmware hal.h
# GPIO3 is a strapping pin — warning is expected and safe to ignore on this hardware

i2c:
  sda: GPIO3
  scl: GPIO2
  frequency: 100000
  scan: true
  id: i2c_bus

# ── SPI (e-paper display) ─────────────────────────────────────────────────────

spi:
  clk_pin: GPIO15
  mosi_pin: GPIO13

# ── Colors ────────────────────────────────────────────────────────────────────

color:
  - id: color_black
    red: 0%
    green: 0%
    blue: 0%
  - id: color_white
    red: 100%
    green: 100%
    blue: 100%
  - id: color_red
    red: 100%
    green: 0%
    blue: 0%
  - id: color_blue
    red: 0%
    green: 0%
    blue: 100%
  - id: color_green
    red: 0%
    green: 100%
    blue: 0%
  # color_yellow: used as the dither pair with color_red to simulate orange header
  # to simulate orange in the header (1px checkerboard). Spectra-E6 has no native orange.
  - id: color_yellow
    red: 100%
    green: 100%
    blue: 0%

