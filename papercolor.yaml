# ── Sensors ───────────────────────────────────────────────────────────────────

sensor:
  - platform: sht4x
    temperature:
      name: "Room Temperature"
      id: local_temp
      unit_of_measurement: "°F"
      filters:
        - lambda: return x * 9.0 / 5.0 + 32.0;
    humidity:
      name: "Room Humidity"
      id: local_humidity
    address: 0x44
    update_interval: 15s

  - platform: template
    name: "Battery Voltage"
    id: battery_mv
    unit_of_measurement: "mV"
    accuracy_decimals: 0
    device_class: voltage
    state_class: measurement
    entity_category: diagnostic
    update_interval: never
    lambda: |-
      // Read VBAT from M5PM1 register 0x22 (16-bit little-endian, value in mV)
      // Take 5 readings and return median to reject ADC glitches
      auto *bus = id(i2c_bus);
      const uint8_t addr = 0x6E;
      uint16_t readings[5];
      for (int i = 0; i < 5; i++) {
        uint8_t reg = 0x22;
        uint8_t data[2] = {0, 0};
        bus->write(addr, &reg, 1, false);
        bus->read(addr, data, 2);
        readings[i] = data[0] | (data[1] << 8);
        delay(10);
      }
      // Sort and return median (index 2)
      for (int i = 0; i < 4; i++)
        for (int j = i+1; j < 5; j++)
          if (readings[i] > readings[j]) { uint16_t t = readings[i]; readings[i] = readings[j]; readings[j] = t; }
      uint16_t mv = readings[2];
      if (mv < 3000) return {};  // reject invalid readings
      return (float)mv;


  - platform: copy
    source_id: battery_mv
    name: "Battery"
    id: battery_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery
    state_class: measurement
    # Piecewise linear approximation of LiPo discharge curve for 1S 1250mAh cell.
    # Calibration points derived from actual discharge data on this device.
    # Tune by noting mV readings at known states and updating points below, then OTA flash.
    # Calibrated from full discharge run Jun 5–7 2026 (5-min sleep intervals, 1250mAh cell).
    # Cliff confirmed at ~3300 mV; effective PMIC cutoff at ~3000–3018 mV under load.
    # NOTE: calibrate_linear with multiple points does a global least-squares fit (not piecewise),
    # so a lambda filter is used here to implement true piecewise linear interpolation.
    # 4160 mV = measured resting OCV after full charge (USB removed). 4244 mV anchor covers charger-maintained voltage.
    # Curve derived from history-24.csv full discharge run (Jun 5–7 2026, 43.93 hrs total), then rescaled so that
    # 3350 mV = 0% (low-battery shutdown threshold) and 4160 mV = 100%. Users see 0% when the device shuts down,
    # not a confusing ~8%. Each anchor = rescaled fraction of usable capacity remaining at that voltage.
    filters:
      - lambda: |-
          struct Pt { float x, y; };
          static const Pt pts[] = {
            {3000, 0}, {3350, 0}, {3400, 5}, {3500, 13},
            {3600, 28}, {3700, 42}, {3800, 53}, {3900, 62},
            {4000, 78}, {4080, 96}, {4160, 100}, {4244, 100}
          };
          const int n = sizeof(pts) / sizeof(pts[0]);
          if (x <= pts[0].x) return 0.0f;
          if (x >= pts[n-1].x) return 100.0f;
          for (int i = 1; i < n; i++) {
            if (x <= pts[i].x) {
              float t = (x - pts[i-1].x) / (pts[i].x - pts[i-1].x);
              return pts[i-1].y + t * (pts[i].y - pts[i-1].y);
            }
          }
          return 100.0f;
      - clamp:
          min_value: 0
          max_value: 100

  - platform: homeassistant
    id: ha_outdoor_temp
    entity_id: sensor.st_00105004_temperature
    on_value:
      then:
        - if:
            condition:
              # Only trigger if display init is done (>25s) and initial render didn't have data
              lambda: 'return !id(initial_display_done) && millis() > 25000;'
            then:
              - lambda: 'id(initial_display_done) = true;'
              - logger.log: "Outdoor temp arrived after timeout — refreshing display"
              - component.update: battery_mv
              - component.update: wifi_signal_db
              - component.update: m5_color_screen

  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 600s
    entity_category: diagnostic

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: diagnostic
    device_class: ""


# ── Scripts ───────────────────────────────────────────────────────────────────
script:
  # ── PMIC full shutdown ───────────────────────────────────────────────────────
  # Programs M5PM1 internal wake timer (regs 0x38–0x3D) then issues SYS_CMD_OFF
  # (reg 0x0C = 0xA1), cutting all power including the ESP32's 3V3_L2 rail.
  # The PMIC self-restarts after wake_seconds, producing a full cold boot.
  #
  # This achieves ~92 µA standby (product spec) vs ~5-10 mA with ESP32 deep sleep.
  # Empirically confirmed: ESP32 deep sleep provides no meaningful power reduction
  # on this hardware — PMIC + IT8951E controller dominate at ~5-10 mA regardless
  # of sleep interval (5-min and 30-min discharge runs showed identical drain rates).
  #
  # Fail-safe: reads back reg 0x3C after arm — if != 0x0B, aborts and stays awake.
  # If shutdown fails the device stays on (WiFi + HA keep it alive).
  - id: pmic_shutdown
    mode: single
    parameters:
      wake_seconds: uint32_t
    then:
      - lambda: |-
          {
            auto *bus = id(i2c_bus);
            const uint8_t addr = 0x6E;

            // Write POWERON_TIMER: 32-bit LE seconds to regs 0x38–0x3B
            // (bits 31-30 of 0x3B must be 0 per PFalko implementation — mask with 0x7F)
            uint32_t ws = wake_seconds;
            uint8_t timer[5] = {0x38,
                (uint8_t)( ws        & 0xFF),
                (uint8_t)((ws >>  8) & 0xFF),
                (uint8_t)((ws >> 16) & 0xFF),
                (uint8_t)((ws >> 24) & 0x7F)};
            bus->write(addr, timer, 5);

            // Arm timer: write 0x0B to TIM_CFG (reg 0x3C)
            uint8_t arm[2] = {0x3C, 0x0B};
            bus->write(addr, arm, 2);

            // Commit timer: write 0xA5 to TIM_KEY (reg 0x3D) before readback
            // (PFalko sequence: arm → commit → verify. Writing 0x3D first may be required
            // for 0x3C to reflect the armed state on readback.)
            uint8_t commit[2] = {0x3D, 0xA5};
            bus->write(addr, commit, 2);

            // Fail-safe readback: if reg 0x3C != 0x0B, abort shutdown
            uint8_t r = 0x3C, verify = 0;
            bus->write(addr, &r, 1, false);
            bus->read(addr, &verify, 1);
            if (verify != 0x0B) {
              ESP_LOGE("PMIC", "Timer arm FAILED (0x3C = 0x%02X, want 0x0B) — staying awake", verify);
              return;  // abort — device stays awake
            }

            ESP_LOGI("PMIC", "Wake timer armed for %u seconds — issuing SYS_CMD_OFF", wake_seconds);
            delay(120);

            // Full PMIC shutdown — reg 0x0C = 0xA1 (SYS_CMD_OFF)
            // ESP32 loses power immediately. Device reboots after wake_seconds.
            uint8_t off[2] = {0x0C, 0xA1};
            bus->write(addr, off, 2);

            // Should not reach here
            delay(500);
            ESP_LOGE("PMIC", "SYS_CMD_OFF did not take effect — device still running");
          }

  # ── 90-second battery watchdog ──────────────────────────────────────────────
  # Fires if the device is still awake on battery 90 seconds after boot.
  # Replaces the safety guarantee previously provided by deep_sleep run_duration: 60s.
  # If the normal -200 shutdown path completes, the device is already off and this
  # script never triggers. If it hangs (WiFi timeout, stuck wait_until, etc.) this
  # fires pmic_shutdown with a 15-minute retry timer so the battery isn't drained.
  - id: battery_watchdog
    mode: single
    then:
      - delay: 90s
      - if:
          condition:
            lambda: 'return !id(usb_connected).state;'
          then:
            - lambda: 'ESP_LOGW("watchdog", "Battery wake >90s without shutdown — safety net firing");'
            - script.execute:
                id: pmic_shutdown
                wake_seconds: 900  # 15 min retry

  - id: ota_led_flash
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return true;'
          then:
            - light.turn_on:
                id: leds
                red: 0%
                green: 100%
                blue: 0%
                brightness: 30%
            - delay: 500ms
            - light.turn_off: leds
            - delay: 500ms


# ── Configurable intervals ────────────────────────────────────────────────────
number:
  - platform: template
    name: "On USB Refresh Interval"
    id: usb_refresh_mins
    min_value: 5
    max_value: 120
    step: 5
    initial_value: 10
    optimistic: true
    restore_value: true
    unit_of_measurement: "min"
    icon: "mdi:refresh"
    entity_category: config

  - platform: template
    name: "On Battery Sleep Duration"
    id: battery_sleep_mins
    min_value: 5
    max_value: 120
    step: 5
    initial_value: 20
    optimistic: true
    restore_value: true
    unit_of_measurement: "min"
    icon: "mdi:sleep"
    entity_category: config


# ── Switches ──────────────────────────────────────────────────────────────────
switch:
  - platform: template
    name: "Color-coded Header"
    id: header_color_coded
    icon: "mdi:palette"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    entity_category: config

  # Simulate Low Battery — forces the low battery warning screen on next battery wake cycle.
  # Resets to OFF on every boot (restore_mode: ALWAYS_OFF) so it is safe to leave enabled;
  # it cannot get stuck on and cause a boot loop. Useful for testing layout changes.
  - platform: template
    name: "Simulate Low Battery"
    id: simulate_low_battery
    icon: "mdi:battery-alert"
    restore_mode: ALWAYS_OFF
    optimistic: true
    entity_category: config



# ── Buttons ───────────────────────────────────────────────────────────────────
# Physical order left to right: A=GPIO10, B=GPIO9, C=GPIO1
# Button A: manual display refresh (useful for a second refresh within the wake window)
# Button B: wake pin — wakes device from deep sleep, triggers auto refresh + 90s OTA window
# Button C: available for future use

binary_sensor:
  - platform: template
    name: "USB Connected"
    id: usb_connected
    device_class: plug
    entity_category: diagnostic
    lambda: |-
      // Read VIN from M5PM1 register 0x24 (16-bit little-endian, value in mV)
      // VIN > 4000mV indicates USB power is present
      auto *bus = id(i2c_bus);
      const uint8_t addr = 0x6E;
      uint8_t reg = 0x24;
      uint8_t data[2] = {0, 0};
      bus->write(addr, &reg, 1, false);
      bus->read(addr, data, 2);
      uint16_t vin = data[0] | (data[1] << 8);
      return vin > 4000;
    filters:
      - delayed_on_off: 500ms   # debounce transient reads on connect/disconnect
    on_state:
      then:
        - if:
            condition:
              lambda: 'return x;'
            then:
              # ── USB connected ───────────────────────────────────────────────
              # ESPHome binary sensor deduplicates state — on_state only fires on
              # genuine transitions, so no manual guard is needed.
              - lambda: 'ESP_LOGI("USB", "USB connected — PMIC shutdown suspended");'
              - script.stop: ota_led_flash
              - light.turn_off: leds
              - if:
                  condition:
                    lambda: 'return id(initial_display_done);'
                  then:
                    - component.update: battery_mv
                    - component.update: wifi_signal_db
                    - component.update: m5_color_screen
            else:
              # ── USB disconnected → refresh display, then PMIC shutdown ───────
              # Guard: only act after boot is complete. The -200 boot sequence
              # handles shutdown for devices that boot without USB; we must not race it.
              - if:
                  condition:
                    lambda: 'return id(initial_display_done);'
                  then:
                    - lambda: 'ESP_LOGI("USB", "USB disconnected — refreshing then issuing PMIC shutdown");'
                    - component.update: battery_mv
                    - component.update: wifi_signal_db
                    - component.update: m5_color_screen
                    - delay: 20s   # wait for EPD panel refresh to complete (~15-19s)
                    - script.execute:
                        id: pmic_shutdown
                        wake_seconds: !lambda 'return (uint32_t)(id(battery_sleep_mins).state * 60.0f);'

  - platform: gpio
    pin:
      number: GPIO10
      inverted: true
      mode: INPUT_PULLUP
    name: "Button A"
    id: btn_a
    filters:
      - delayed_on: 10ms
    on_press:
      then:
        - logger.log: "Button A pressed — refreshing display"
        - component.update: battery_mv
        - component.update: wifi_signal_db
        - component.update: m5_color_screen


  - platform: gpio
    pin:
      number: GPIO1
      inverted: true
      mode: INPUT_PULLUP
    name: "Button C"
    id: btn_c
    filters:
      - delayed_on: 10ms
    on_press:
      then:
        - logger.log: "Button C pressed"

# ── RGB LEDs ──────────────────────────────────────────────────────────────────

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO21
    num_leds: 2
    chipset: WS2812
    name: "LEDs"
    id: leds
    internal: true
    default_transition_length: 0s

# ── IR Transmitter ────────────────────────────────────────────────────────────
# Disabled: conflicts with LED strip for RMT channels. Re-enable if IR needed
# and LED strip is removed or a different LED driver is used.
# remote_transmitter:
#   pin: GPIO48
#   carrier_duty_percent: 50%
#   non_blocking: true

# ── E-Paper Display ───────────────────────────────────────────────────────────
# Panel: EL040EF1 / ED2208-DOA — E Ink Spectra 6 (7-color), 400×600, 4"
# Rotation 270° = landscape. Dimensions reported as 600×400 by driver.
# BUSY pin must be inverted: true — confirmed from Seeed reTerminal reference
# design (also Spectra-E6) and required for this panel's BUSY polarity.

display:
  - platform: epaper_spi
    id: m5_color_screen
    model: Spectra-E6
    cs_pin: GPIO44
    dc_pin: GPIO43
    busy_pin:
      number: GPIO11
      inverted: true
      mode:
        input: true
        pullup: true
    reset_pin: GPIO12
    dimensions:
      width: 400
      height: 600
    rotation: 270°
    update_interval: never
    lambda: |-
      it.fill(id(color_white));

      // ── Low battery screen ────────────────────────────────────────────────
      // Shown when battery_mv < 3450 mV at boot. Renders then device issues PMIC
      // full shutdown with 7-day timer. Wake via physical power button (S4) after charging.
      if (id(low_battery_triggered)) {
        it.filled_rectangle(0, 0, 600, 56, id(color_red));
        it.print(300, 12, id(font_large), id(color_white), TextAlign::TOP_CENTER, "BATTERY LOW");
        it.print(300, 100, id(font_large), id(color_red), TextAlign::TOP_CENTER, "Please charge via USB-C");
        it.print(300, 180, id(icon_font), id(color_red), TextAlign::TOP_CENTER, "\U000F008E");
        if (id(battery_pct).has_state()) {
          it.printf(300, 215, id(font_small), id(color_black), TextAlign::TOP_CENTER, "%.0f%% remaining", id(battery_pct).state);
        }
        it.horizontal_line(60, 270, 480, id(color_black));
        it.print(300, 290, id(font_main), id(color_black), TextAlign::TOP_CENTER, "Device has powered off to preserve battery.");
        it.print(300, 325, id(font_small), id(color_black), TextAlign::TOP_CENTER, "Charge via USB-C, then press the power button to wake.");
        return;
      }

      // ── Header color — color-coded by outdoor temp if switch enabled ──────
      // Bands: blue ≤64°F, green ≤75.5°F, orange (dithered) ≤85.5°F, red >85.5°F
      // Orange is simulated via 1px red/yellow checkerboard dither — no solid orange in Spectra E6.
      // Black text on orange (light dither); white text on blue/green/red.
      bool _header_orange = false;
      Color header_color = id(color_blue);
      if (id(header_color_coded).state && id(ha_outdoor_temp).has_state()) {
        float _ot = id(ha_outdoor_temp).state;
        if      (_ot <= 64.0f)  header_color = id(color_blue);
        else if (_ot <= 75.5f)  header_color = id(color_green);
        else if (_ot <= 85.5f)  { _header_orange = true; }  // orange: drawn as red+yellow 1px dither below; header_color unused for this band
        else                    header_color = id(color_red);
      }

      // ── Header bar ────────────────────────────────────────────────────────
      if (_header_orange) {
        // 1px checkerboard dither: red + yellow → orange
        for (int _y = 0; _y < 56; _y++)
          for (int _x = 0; _x < 600; _x++)
            it.draw_pixel_at(_x, _y, ((_x + _y) % 2 == 0) ? id(color_red) : id(color_yellow));
      } else {
        it.filled_rectangle(0, 0, 600, 56, header_color);
      }
      // Orange dither is a light mix — use black text; dark headers use white
      Color header_text_color = _header_orange ? id(color_black) : id(color_white);
      it.print(300, 12, id(font_large), header_text_color, TextAlign::TOP_CENTER, "HOME ASSISTANT");


      // ── Outdoor temperature (hero — full width, centered) ────────────────
      it.print(300, 64, id(font_small), id(color_blue), TextAlign::TOP_CENTER, "OUTDOORS");
      if (id(ha_outdoor_temp).has_state()) {
        it.printf(300, 82, id(font_outdoor), id(color_black), TextAlign::TOP_CENTER, "%.0f°F", id(ha_outdoor_temp).state);
      } else {
        it.print(300, 82, id(font_main), id(color_red), TextAlign::TOP_CENTER, "Connecting...");
      }

      // ── Room temperature & humidity ───────────────────────────────────────
      it.print(300, 290, id(font_small), id(color_blue), TextAlign::TOP_CENTER, "ROOM");
      if (!isnan(id(local_temp).state) && !isnan(id(local_humidity).state)) {
        it.printf(300, 310, id(font_main), id(color_black), TextAlign::TOP_CENTER, "%.1f°F  %.0f%% RH", id(local_temp).state, id(local_humidity).state);
      } else {
        it.print(300, 310, id(font_main), id(color_red), TextAlign::TOP_CENTER, "Reading...");
      }

      // ── Divider ───────────────────────────────────────────────────────────
      it.horizontal_line(20, 348, 560, id(color_blue));

      // ── Footer: WiFi (left) · Updated (center) · Battery (right) ─────────
      // WiFi MDI icon (bottom left)
      {
        float _wsig = id(wifi_signal_db).state;
        bool _wifi_ok = !isnan(_wsig);
        const char* wifi_icon;
        Color wifi_color = id(color_black);
        if (!_wifi_ok) {
          wifi_icon = "\U0000ECFA";  // wifi-off (slashed)
          wifi_color = id(color_red);
        } else if (_wsig >= -45) {
          wifi_icon = "\U0000EB52";  // wifi (3 bars)
        } else if (_wsig >= -60) {
          wifi_icon = "\U0000EBA5";  // wifi-2 (2 bars)
        } else if (_wsig >= -75) {
          wifi_icon = "\U0000EBA4";  // wifi-1 (1 bar)
        } else {
          wifi_icon = "\U0000EBA3";  // wifi-0 (dot only)
          wifi_color = id(color_red);
        }
        it.print(20, 356, id(tabler_font), wifi_color, TextAlign::TOP_LEFT, wifi_icon);
        if (_wifi_ok) {
          float _wpct = min(max(2.0f * (_wsig + 100.0f), 0.0f), 100.0f);
          it.printf(50, 362, id(font_small), id(color_black), TextAlign::TOP_LEFT, "%.0f%%", _wpct);
        } else {
          it.print(50, 362, id(font_small), id(color_black), TextAlign::TOP_LEFT, "--");
        }
      }

      // Updated timestamp (center)
      if (id(ha_time).now().is_valid()) {
        char time_buf[32];
        id(ha_time).now().strftime(time_buf, sizeof(time_buf), "Updated %I:%M %p");
        it.print(300, 362, id(font_small), id(color_black), TextAlign::TOP_CENTER, time_buf);
      }

      // Battery icon + text (right)
      if (id(battery_pct).has_state()) {
        float pct = id(battery_pct).state;
        bool charging = id(usb_connected).state;
        Color bat_color = (charging || pct > 20) ? id(color_black) : id(color_red);
        const char* bat_icon;
        if (charging) {
          if      (pct >= 95) bat_icon = "\U000F0085";
          else if (pct >= 85) bat_icon = "\U000F008B";
          else if (pct >= 75) bat_icon = "\U000F008A";
          else if (pct >= 65) bat_icon = "\U000F089E";
          else if (pct >= 55) bat_icon = "\U000F0089";
          else if (pct >= 45) bat_icon = "\U000F089D";
          else if (pct >= 35) bat_icon = "\U000F0088";
          else if (pct >= 25) bat_icon = "\U000F0087";
          else if (pct >= 15) bat_icon = "\U000F0086";
          else                bat_icon = "\U000F089C";
        } else {
          if      (pct >= 95) bat_icon = "\U000F0079";
          else if (pct >= 85) bat_icon = "\U000F0082";
          else if (pct >= 75) bat_icon = "\U000F0081";
          else if (pct >= 65) bat_icon = "\U000F0080";
          else if (pct >= 55) bat_icon = "\U000F007F";
          else if (pct >= 45) bat_icon = "\U000F007E";
          else if (pct >= 35) bat_icon = "\U000F007D";
          else if (pct >= 25) bat_icon = "\U000F007C";
          else if (pct >= 15) bat_icon = "\U000F007B";
          else if (pct >= 5)  bat_icon = "\U000F007A";
          else                bat_icon = "\U000F008E";
        }
        it.print(510, 356, id(icon_font), bat_color, TextAlign::TOP_LEFT, bat_icon);
        if (charging) {
          it.print(540, 360, id(font_small), id(color_black), TextAlign::TOP_LEFT, "CHG");
        } else {
          it.printf(540, 360, id(font_small), id(color_black), TextAlign::TOP_LEFT, "%.0f%%", pct);
        }
      }

# ── Interval refresh (USB only) ───────────────────────────────────────────────
# When on USB power, deep sleep is prevented and the wake/sleep cycle stops.
# This interval fires every minute and triggers a refresh when the configured USB interval has elapsed.
# It's a no-op on battery because the device is asleep between refreshes.

interval:
  - interval: 1min
    then:
      - if:
          condition:
            lambda: |-
              return id(usb_connected).state &&
                     (millis() - id(last_usb_refresh_ms)) >= (uint32_t)(id(usb_refresh_mins).state * 60000.0f);
          then:
            - lambda: 'id(last_usb_refresh_ms) = millis();'
            - logger.log: "Interval refresh — USB connected"
            - component.update: battery_mv
            - component.update: wifi_signal_db
            - component.update: m5_color_screen

# ── Diagnostics ───────────────────────────────────────────────────────────────

text_sensor:
  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
    update_interval: 60s
    entity_category: diagnostic

  - platform: template
    name: "Build DateTime"
    id: build_date_sensor
    update_interval: never
    icon: "mdi:clock-outline"
    entity_category: diagnostic
    lambda: 'return {__DATE__ " " __TIME__};'

  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
    ssid:
      name: "Connected SSID"
      entity_category: diagnostic

  - platform: template
    name: "Last Reset Reason"
    id: reset_reason
    entity_category: diagnostic
    icon: "mdi:restart-alert"
    update_interval: never
    lambda: |-
      switch (esp_reset_reason()) {
        case ESP_RST_POWERON:   return {"Power On"};
        case ESP_RST_EXT:       return {"External Pin"};
        case ESP_RST_SW:        return {"Software"};
        case ESP_RST_PANIC:     return {"Panic / Exception"};
        case ESP_RST_INT_WDT:   return {"Interrupt Watchdog"};
        case ESP_RST_TASK_WDT:  return {"Task Watchdog"};
        case ESP_RST_WDT:       return {"Watchdog (other)"};
        case ESP_RST_DEEPSLEEP: return {"Deep Sleep Wake"};
        case ESP_RST_BROWNOUT:  return {"Brownout"};
        default:                return {"Unknown"};
      }

# ── Sleep / Wake ──────────────────────────────────────────────────────────────
# Wake cycle: PMIC timer fires → cold boot → WiFi → sensors → display → PMIC shutdown
# On-demand wake: press physical power button S4 (PMIC-side) → same cold boot sequence.
# OTA: press S4, wait for blue boot flash, then initiate OTA from HA within ~60s.
# (Button B / GPIO9 no longer wakes — ESP32 is fully powerless during PMIC shutdown.)
