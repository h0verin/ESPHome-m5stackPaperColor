esphome:
  name: papercolor
  friendly_name: M5Stack PaperColor
  on_boot:
    # ── M5PM1 PMIC boot sequence (priority 800) ───────────────────────────────
    # The M5PM1 is a custom power management IC that controls the EPD power rail.
    # By default at power-on, the EPD rail is OFF — the display will not respond
    # to any SPI commands until the rail is enabled.
    #
    # This lambda runs at priority 800 (early boot), which is AFTER the I2C bus
    # is initialized (priority 900) but BEFORE the epaper_spi display component
    # sets up (priority 500). This ordering is critical — if the display tries to
    # initialize before the EPD rail is on, it will hang waiting for the BUSY pin.
    #
    # The register sequence below is derived from the M5Stack factory firmware HAL:
    #   https://github.com/m5stack/M5PaperColor-UserDemo/blob/main/main/hal/hal.cpp
    # and the M5GFX library source. It is equivalent to calling:
    #   pm1.pinMode(EPD_EN, OUTPUT);    // EPD_EN = M5PM1 GPIO0
    #   pm1.digitalWrite(EPD_EN, HIGH); // enable EPD power rail
    #   pm1.setChargeEnable(true);      // PWR_CFG reg 0x06 bit 0
    #   pm1.setBoostEnable(true);       // PWR_CFG reg 0x06 bit 3 — generates
    #                                   // high-voltage rails (~15V) needed for
    #                                   // e-paper pixel switching
    #
    # We use ESPHome's native I2C bus API (id(i2c_bus)) rather than Arduino Wire
    # because the combined arduino/espidf framework does not expose Wire in the
    # ESPHome lambda scope.
    #
    # M5PM1 I2C address: 0x6E. Chip ID register 0x00 must return 0x50.
    - priority: 800.0
      then:
        - lambda: |-
            delay(200);
            auto *bus = id(i2c_bus);
            const uint8_t addr = 0x6E;

            ESP_LOGI("M5PM1", "Starting M5PM1 init...");

            uint8_t reg = 0x00, chip_id = 0;
            auto write_err = bus->write(addr, &reg, 1, false);
            auto read_err = bus->read(addr, &chip_id, 1);

            ESP_LOGI("M5PM1", "Write err: %d, Read err: %d, Chip ID: 0x%02X", (int)write_err, (int)read_err, chip_id);

            if (chip_id != 0x50) {
              ESP_LOGE("M5PM1", "Unexpected chip ID: 0x%02X (expected 0x50)", chip_id);
              return;
            }

            { uint8_t d[2] = {0x0A, 0x00}; bus->write(addr, d, 2); }

            // GPIO function select — set GPIO0 and GPIO3 to plain GPIO mode (reg 0x16)
            { uint8_t r = 0x16, v = 0; bus->write(addr, &r, 1, false); bus->read(addr, &v, 1);
              uint8_t d[2] = {r, uint8_t(v & ~((1<<0) | (1<<3)))}; bus->write(addr, d, 2); }

            // GPIO direction — set GPIO0 (EPD) and GPIO3 (SD) as outputs (reg 0x10)
            { uint8_t r = 0x10, v = 0; bus->write(addr, &r, 1, false); bus->read(addr, &v, 1);
              uint8_t d[2] = {r, uint8_t(v | (1<<0) | (1<<3))}; bus->write(addr, d, 2); }

            // GPIO push-pull mode — disable open-drain on GPIO0 and GPIO3 (reg 0x13)
            { uint8_t r = 0x13, v = 0; bus->write(addr, &r, 1, false); bus->read(addr, &v, 1);
              uint8_t d[2] = {r, uint8_t(v & ~((1<<0) | (1<<3)))}; bus->write(addr, d, 2); }

            // GPIO output HIGH — enable EPD (GPIO0) and SD (GPIO3) power rails (reg 0x11)
            { uint8_t r = 0x11, v = 0; bus->write(addr, &r, 1, false); bus->read(addr, &v, 1);
              uint8_t d[2] = {r, uint8_t(v | (1<<0) | (1<<3))}; bus->write(addr, d, 2); }

            // PWR_CFG (0x06): enable charging (bit0), 5V DCDC (bit1), 3.3V LDO (bit2),
            // boost converter (bit3) — auto-clear on reset so must be set every boot
            { uint8_t r = 0x06, v = 0; bus->write(addr, &r, 1, false); bus->read(addr, &v, 1);
              uint8_t d[2] = {r, uint8_t(v | (1<<0) | (1<<1) | (1<<2) | (1<<3))}; bus->write(addr, d, 2); }
            ESP_LOGI("M5PM1", "Charge + DCDC + LDO + Boost enabled");

            // HOLD_CFG (0x07): maintain EPD (bit0), SD (bit3), and 3.3V (bit5) rails
            // on USB disconnect — without this the PMIC may reset when USB is unplugged
            { uint8_t r = 0x07, v = 0; bus->write(addr, &r, 1, false); bus->read(addr, &v, 1);
              uint8_t d[2] = {r, uint8_t(v | (1<<0) | (1<<3) | (1<<5))}; bus->write(addr, d, 2); }
            ESP_LOGI("M5PM1", "Power hold configured");

            // Button config — disable hardware reset functions on physical buttons
            // to prevent unintended resets (regs 0x49 and 0x4A)
            { uint8_t d[2] = {0x49, 0x00}; bus->write(addr, d, 2); }
            { uint8_t d[2] = {0x4A, 0x00}; bus->write(addr, d, 2); }

            delay(500);
            ESP_LOGI("M5PM1", "EPD power rail enabled");
    - priority: 600
      then:
        - lambda: |-
            // If woken by Button B (GPIO wake) and not on USB power, turn LEDs green
            // as a visual "ready to flash wirelessly" indicator.
            esp_sleep_wakeup_cause_t cause = esp_sleep_get_wakeup_cause();
            bool gpio_wake = (cause == ESP_SLEEP_WAKEUP_EXT0 || cause == ESP_SLEEP_WAKEUP_EXT1);
            if (gpio_wake) {
              ESP_LOGI("boot", "Woke via Button B — starting OTA indicator LED flash");
              id(ota_led_flash).execute();
            }
    - priority: -100
      then:
        - lambda: |-
            // Brief blue boot-confirmation flash — skip if already lit for GPIO wake indicator
            esp_sleep_wakeup_cause_t cause = esp_sleep_get_wakeup_cause();
            bool gpio_wake = (cause == ESP_SLEEP_WAKEUP_EXT0 || cause == ESP_SLEEP_WAKEUP_EXT1);
            if (!gpio_wake) {
              auto call = id(leds).turn_on();
              call.set_rgb(0.0f, 0.0f, 1.0f);
              call.set_brightness(0.3f);
              call.perform();
            }
        - if:
            condition:
              lambda: |-
                esp_sleep_wakeup_cause_t cause = esp_sleep_get_wakeup_cause();
                return cause != ESP_SLEEP_WAKEUP_EXT0 && cause != ESP_SLEEP_WAKEUP_EXT1;
            then:
              - delay: 1s
              - light.turn_off: leds
    - priority: -200
      then:
        - delay: 25s     # display hardware init takes ~19s; wait for it to complete
        - wait_until:
            condition:
              and:
                - lambda: 'return id(ha_outdoor_temp).has_state();'
                - lambda: 'return !isnan(id(local_temp).state);'
            timeout: 60s  # give up and refresh with whatever we have after 60s
        - component.update: reset_reason
        - component.update: build_date_sensor
        - component.update: battery_mv
        - if:
            condition:
              # Low battery path: triggers if voltage is valid and below threshold,
              # or if the "Simulate Low Battery" switch is on.
              # USB guard: never trigger on USB — deep_sleep.enter bypasses prevent
              # and would force sleep even while charging, which is incorrect.
              # NaN (no reading) evaluates false — safe fallback to normal path.
              lambda: |-
                if (id(usb_connected).state) return false;
                return (id(battery_mv).has_state() && id(battery_mv).state < 3350.0f)
                       || id(simulate_low_battery).state;
            then:
              # ── Low battery boot path ────────────────────────────────────────────
              # Render warning screen then enter indefinite deep sleep (GPIO wake only).
              # EPD rails stay on through the 20s refresh window, then are disabled.
              - lambda: |-
                  id(low_battery_triggered) = true;
                  ESP_LOGW("battery", "Low battery (%.0f mV) — showing warning screen", id(battery_mv).state);
              - component.update: m5_color_screen
              - script.stop: ota_led_flash
              - light.turn_off: leds
              # Wait for EPD panel refresh to complete before cutting rails
              - delay: 20s
              - lambda: |-
                  {
                    auto *bus = id(i2c_bus);
                    const uint8_t addr = 0x6E;
                    // Reg 0x11: pull EPD (GPIO0, bit0) and SD (GPIO3, bit3) rails LOW
                    uint8_t r = 0x11, v = 0;
                    bus->write(addr, &r, 1, false);
                    bus->read(addr, &v, 1);
                    uint8_t d[2] = {r, uint8_t(v & ~((1<<0) | (1<<3)))};
                    bus->write(addr, d, 2);
                    // Reg 0x06: disable RGB LDO (bit2=LDO_EN=PY_RGB_PWR_EN) and Grove Boost (bit3=BOOST_EN=PY_GROVE_OUT_EN)
                    r = 0x06; v = 0;
                    bus->write(addr, &r, 1, false);
                    bus->read(addr, &v, 1);
                    uint8_t d2[2] = {r, uint8_t(v & ~((1<<2) | (1<<3)))};
                    bus->write(addr, d2, 2);
                    ESP_LOGI("M5PM1", "EPD + SD + RGB LDO + Grove Boost disabled (low battery)");
                  }
              # Indefinite sleep — wake via Button B (GPIO9) only, no timer
              - lambda: |-
                  id(deep_sleep_ctrl).set_sleep_duration(7ULL * 24ULL * 3600ULL * 1000ULL);
                  ESP_LOGI("sleep", "Entering indefinite deep sleep (low battery)");
              - deep_sleep.enter: deep_sleep_ctrl
            else:
              # ── Normal boot path ─────────────────────────────────────────────────
              - component.update: wifi_signal_db
              - if:
                  condition:
                    lambda: 'return id(ha_outdoor_temp).has_state();'
                  then:
                    - lambda: 'id(initial_display_done) = true;'
                    - logger.log: "Sensors ready — marking initial display done before refresh"
              - component.update: m5_color_screen
              - script.stop: ota_led_flash
              - light.turn_off: leds
              # 20s covers: 150ms WS2812 off-frame settle + up to ~19s Spectra E6 full refresh.
              # The EPD component.update is asynchronous — the panel refresh runs in the background
              # and takes 15–19s. We must not cut the EPD power rail until it is complete.
              - delay: 20s
              - lambda: 'id(last_usb_refresh_ms) = millis();'
              - lambda: |-
                  uint64_t sleep_ms = (uint64_t)(id(battery_sleep_mins).state * 60.0f) * 1000ULL;
                  id(deep_sleep_ctrl).set_sleep_duration(sleep_ms);
                  ESP_LOGI("sleep", "Battery sleep duration set to %.0f min", id(battery_sleep_mins).state);
              - if:
                  condition:
                    lambda: 'return id(usb_connected).state;'
                  then:
                    - logger.log: "USB connected — skipping deep sleep"
                    - deep_sleep.prevent: deep_sleep_ctrl
                  else:
                    # ── M5PM1 rail disable before sleep ────────────────────────────
                    # Only disable when going to sleep — on USB the rails must stay on so
                    # the interval refresh can update the display without a reboot.
                    # All rails re-enabled unconditionally at the next boot (priority 800).
                    # Reg 0x11 bits: EPD (GPIO0, bit0), SD (GPIO3, bit3)
                    # Reg 0x06 bits: RGB LDO (bit2=LDO_EN=PY_RGB_PWR_EN), Grove Boost (bit3=BOOST_EN=PY_GROVE_OUT_EN)
                    - lambda: |-
                        {
                          auto *bus = id(i2c_bus);
                          const uint8_t addr = 0x6E;
                          uint8_t r = 0x11, v = 0;
                          bus->write(addr, &r, 1, false);
                          bus->read(addr, &v, 1);
                          uint8_t d[2] = {r, uint8_t(v & ~((1<<0) | (1<<3)))};
                          bus->write(addr, d, 2);
                          r = 0x06; v = 0;
                          bus->write(addr, &r, 1, false);
                          bus->read(addr, &v, 1);
                          uint8_t d2[2] = {r, uint8_t(v & ~((1<<2) | (1<<3)))};
                          bus->write(addr, d2, 2);
                          ESP_LOGI("M5PM1", "EPD + SD + RGB LDO + Grove Boost disabled before sleep");
                        }

# ── Globals ───────────────────────────────────────────────────────────────────

globals:
  - id: initial_display_done
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: last_usb_refresh_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: low_battery_triggered
    type: bool
    restore_value: false
    initial_value: 'false'

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80MHz

logger:
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret papercolor_api_key

ota:
  - platform: esphome
    password: !secret papercolor_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # use_address: 192.168.3.x  # Uncomment and set to your device's reserved/static IP
                               # Improves OTA reliability by bypassing mDNS resolution
  ap:
    ssid: "PaperColor Fallback"
    password: !secret papercolor_ap_password

captive_portal:

# ── Time ──────────────────────────────────────────────────────────────────────

time:
  - platform: homeassistant
    id: ha_time
    timezone: "America/Los_Angeles"

# ── I2C ───────────────────────────────────────────────────────────────────────
# SDA=GPIO3, SCL=GPIO2 confirmed from M5GFX source and factory firmware hal.h
# GPIO3 is a strapping pin — warning is expected and safe to ignore on this hardware

i2c:
  sda: GPIO3
  scl: GPIO2
  frequency: 100000
  scan: true
  id: i2c_bus

# ── SPI (e-paper display) ─────────────────────────────────────────────────────

spi:
  clk_pin: GPIO15
  mosi_pin: GPIO13

# ── Colors ────────────────────────────────────────────────────────────────────

color:
  - id: color_black
    red: 0%
    green: 0%
    blue: 0%
  - id: color_white
    red: 100%
    green: 100%
    blue: 100%
  - id: color_red
    red: 100%
    green: 0%
    blue: 0%
  - id: color_blue
    red: 0%
    green: 0%
    blue: 100%
  - id: color_green
    red: 0%
    green: 100%
    blue: 0%
  # color_yellow: used as the dither pair with color_red to simulate orange header
  # to simulate orange in the header (1px checkerboard). Spectra-E6 has no native orange.
  - id: color_yellow
    red: 100%
    green: 100%
    blue: 0%

# ── Fonts ─────────────────────────────────────────────────────────────────────

font:
  - file: "gfonts://Ubuntu"
    id: font_large
    size: 32
  - file: "gfonts://Ubuntu"
    id: font_main
    size: 24
  - file: "gfonts://Ubuntu"
    id: font_small
    size: 18
  - file: "gfonts://Ubuntu"
    id: font_outdoor
    size: 144

  # MDI icon font — battery icons for header display
  - file: "https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: icon_font
    size: 26
    glyphs:
      - "\U000F0079"  # battery (100%)
      - "\U000F0082"  # battery-90
      - "\U000F0081"  # battery-80
      - "\U000F0080"  # battery-70
      - "\U000F007F"  # battery-60
      - "\U000F007E"  # battery-50
      - "\U000F007D"  # battery-40
      - "\U000F007C"  # battery-30
      - "\U000F007B"  # battery-20
      - "\U000F007A"  # battery-10
      - "\U000F008E"  # battery-outline (0%)
      - "\U000F0085"  # battery-charging-100
      - "\U000F008B"  # battery-charging-90
      - "\U000F008A"  # battery-charging-80
      - "\U000F089E"  # battery-charging-70
      - "\U000F0089"  # battery-charging-60
      - "\U000F089D"  # battery-charging-50
      - "\U000F0088"  # battery-charging-40
      - "\U000F0087"  # battery-charging-30
      - "\U000F0086"  # battery-charging-20
      - "\U000F089C"  # battery-charging-10
  # Tabler icon font — wifi icons for footer display
  - file: "https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/fonts/tabler-icons.ttf"
    id: tabler_font
    size: 26
    glyphs:
      - "\U0000EB52"  # wifi (full, 3 bars)
      - "\U0000EBA5"  # wifi-2 (2 bars)
      - "\U0000EBA4"  # wifi-1 (1 bar)
      - "\U0000EBA3"  # wifi-0 (dot only)
      - "\U0000ECFA"  # wifi-off (slashed)

# ── Sensors ───────────────────────────────────────────────────────────────────

sensor:
  - platform: sht4x
    temperature:
      name: "Room Temperature"
      id: local_temp
      unit_of_measurement: "°F"
      filters:
        - lambda: return x * 9.0 / 5.0 + 32.0;
    humidity:
      name: "Room Humidity"
      id: local_humidity
    address: 0x44
    update_interval: 15s

  - platform: template
    name: "Battery Voltage"
    id: battery_mv
    unit_of_measurement: "mV"
    accuracy_decimals: 0
    device_class: voltage
    state_class: measurement
    entity_category: diagnostic
    update_interval: never
    lambda: |-
      // Read VBAT from M5PM1 register 0x22 (16-bit little-endian, value in mV)
      // Take 5 readings and return median to reject ADC glitches
      auto *bus = id(i2c_bus);
      const uint8_t addr = 0x6E;
      uint16_t readings[5];
      for (int i = 0; i < 5; i++) {
        uint8_t reg = 0x22;
        uint8_t data[2] = {0, 0};
        bus->write(addr, &reg, 1, false);
        bus->read(addr, data, 2);
        readings[i] = data[0] | (data[1] << 8);
        delay(10);
      }
      // Sort and return median (index 2)
      for (int i = 0; i < 4; i++)
        for (int j = i+1; j < 5; j++)
          if (readings[i] > readings[j]) { uint16_t t = readings[i]; readings[i] = readings[j]; readings[j] = t; }
      uint16_t mv = readings[2];
      if (mv < 3000) return {};  // reject invalid readings
      return (float)mv;


  - platform: copy
    source_id: battery_mv
    name: "Battery"
    id: battery_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery
    state_class: measurement
    # Piecewise linear approximation of LiPo discharge curve for 1S 1250mAh cell.
    # Calibration points derived from actual discharge data on this device.
    # Tune by noting mV readings at known states and updating points below, then OTA flash.
    # Calibrated from full discharge run Jun 5–7 2026 (5-min sleep intervals, 1250mAh cell).
    # Cliff confirmed at ~3300 mV; effective PMIC cutoff at ~3000–3018 mV under load.
    # NOTE: calibrate_linear with multiple points does a global least-squares fit (not piecewise),
    # so a lambda filter is used here to implement true piecewise linear interpolation.
    # 4160 mV = measured resting OCV after full charge (USB removed). 4244 mV anchor covers charger-maintained voltage.
    # Curve derived from history-24.csv full discharge run (Jun 5–7 2026, 43.93 hrs total), then rescaled so that
    # 3350 mV = 0% (low-battery shutdown threshold) and 4160 mV = 100%. Users see 0% when the device shuts down,
    # not a confusing ~8%. Each anchor = rescaled fraction of usable capacity remaining at that voltage.
    filters:
      - lambda: |-
          struct Pt { float x, y; };
          static const Pt pts[] = {
            {3000, 0}, {3350, 0}, {3400, 5}, {3500, 13},
            {3600, 28}, {3700, 42}, {3800, 53}, {3900, 62},
            {4000, 78}, {4080, 96}, {4160, 100}, {4244, 100}
          };
          const int n = sizeof(pts) / sizeof(pts[0]);
          if (x <= pts[0].x) return 0.0f;
          if (x >= pts[n-1].x) return 100.0f;
          for (int i = 1; i < n; i++) {
            if (x <= pts[i].x) {
              float t = (x - pts[i-1].x) / (pts[i].x - pts[i-1].x);
              return pts[i-1].y + t * (pts[i].y - pts[i-1].y);
            }
          }
          return 100.0f;
      - clamp:
          min_value: 0
          max_value: 100

  - platform: homeassistant
    id: ha_outdoor_temp
    entity_id: sensor.st_00105004_temperature
    on_value:
      then:
        - if:
            condition:
              # Only trigger if display init is done (>25s) and initial render didn't have data
              lambda: 'return !id(initial_display_done) && millis() > 25000;'
            then:
              - lambda: 'id(initial_display_done) = true;'
              - logger.log: "Outdoor temp arrived after timeout — refreshing display"
              - component.update: battery_mv
              - component.update: wifi_signal_db
              - component.update: m5_color_screen

  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 600s
    entity_category: diagnostic

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: diagnostic
    device_class: ""


# ── Scripts ───────────────────────────────────────────────────────────────────
script:
  - id: ota_led_flash
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return true;'
          then:
            - light.turn_on:
                id: leds
                red: 0%
                green: 100%
                blue: 0%
                brightness: 30%
            - delay: 500ms
            - light.turn_off: leds
            - delay: 500ms


# ── Configurable intervals ────────────────────────────────────────────────────
number:
  - platform: template
    name: "On USB Refresh Interval"
    id: usb_refresh_mins
    min_value: 5
    max_value: 120
    step: 5
    initial_value: 10
    optimistic: true
    restore_value: true
    unit_of_measurement: "min"
    icon: "mdi:refresh"
    entity_category: config

  - platform: template
    name: "On Battery Sleep Duration"
    id: battery_sleep_mins
    min_value: 5
    max_value: 120
    step: 5
    initial_value: 20
    optimistic: true
    restore_value: true
    unit_of_measurement: "min"
    icon: "mdi:sleep"
    entity_category: config


# ── Switches ──────────────────────────────────────────────────────────────────
switch:
  - platform: template
    name: "Color-coded Header"
    id: header_color_coded
    icon: "mdi:palette"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    entity_category: config

  # Simulate Low Battery — forces the low battery warning screen on next battery wake cycle.
  # Resets to OFF on every boot (restore_mode: ALWAYS_OFF) so it is safe to leave enabled;
  # it cannot get stuck on and cause a boot loop. Useful for testing layout changes.
  - platform: template
    name: "Simulate Low Battery"
    id: simulate_low_battery
    icon: "mdi:battery-alert"
    restore_mode: ALWAYS_OFF
    optimistic: true
    entity_category: config



# ── Buttons ───────────────────────────────────────────────────────────────────
# Physical order left to right: A=GPIO10, B=GPIO9, C=GPIO1
# Button A: manual display refresh (useful for a second refresh within the wake window)
# Button B: wake pin — wakes device from deep sleep, triggers auto refresh + 90s OTA window
# Button C: available for future use

binary_sensor:
  - platform: template
    name: "USB Connected"
    id: usb_connected
    device_class: plug
    entity_category: diagnostic
    lambda: |-
      // Read VIN from M5PM1 register 0x24 (16-bit little-endian, value in mV)
      // VIN > 4000mV indicates USB power is present
      auto *bus = id(i2c_bus);
      const uint8_t addr = 0x6E;
      uint8_t reg = 0x24;
      uint8_t data[2] = {0, 0};
      bus->write(addr, &reg, 1, false);
      bus->read(addr, data, 2);
      uint16_t vin = data[0] | (data[1] << 8);
      return vin > 4000;
    filters:
      - delayed_on_off: 500ms   # debounce transient reads on connect/disconnect
    on_state:
      then:
        - if:
            condition:
              lambda: 'return x;'
            then:
              # ── USB connected ───────────────────────────────────────────────
              # ESPHome binary sensor deduplicates state — on_state only fires on
              # genuine transitions, so no manual guard is needed.
              - lambda: 'ESP_LOGI("USB", "USB connected — preventing sleep");'
              - script.stop: ota_led_flash
              - light.turn_off: leds
              - deep_sleep.prevent: deep_sleep_ctrl
              - if:
                  condition:
                    lambda: 'return id(initial_display_done);'
                  then:
                    - component.update: battery_mv
                    - component.update: wifi_signal_db
                    - component.update: m5_color_screen
            else:
              # ── USB disconnected → refresh display, then sleep ──────────────
              # Guard: only act after boot is complete. The -200 boot sequence
              # handles sleep for devices that boot without USB; we must not race it.
              - if:
                  condition:
                    lambda: 'return id(initial_display_done);'
                  then:
                    - lambda: 'ESP_LOGI("USB", "USB disconnected — refreshing then sleeping");'
                    - component.update: battery_mv
                    - component.update: wifi_signal_db
                    - component.update: m5_color_screen
                    - delay: 20s   # wait for EPD panel refresh to complete (~15-19s)
                    - lambda: |-
                        {
                          auto *bus = id(i2c_bus);
                          const uint8_t addr = 0x6E;
                          uint8_t r = 0x11, v = 0;
                          bus->write(addr, &r, 1, false);
                          bus->read(addr, &v, 1);
                          uint8_t d[2] = {r, uint8_t(v & ~((1<<0) | (1<<3)))};
                          bus->write(addr, d, 2);
                          r = 0x06; v = 0;
                          bus->write(addr, &r, 1, false);
                          bus->read(addr, &v, 1);
                          uint8_t d2[2] = {r, uint8_t(v & ~((1<<2) | (1<<3)))};
                          bus->write(addr, d2, 2);
                          ESP_LOGI("M5PM1", "EPD + SD + RGB LDO + Grove Boost disabled (USB disconnect)");
                        }
                    - deep_sleep.allow: deep_sleep_ctrl
                    - deep_sleep.enter: deep_sleep_ctrl

  - platform: gpio
    pin:
      number: GPIO10
      inverted: true
      mode: INPUT_PULLUP
    name: "Button A"
    id: btn_a
    filters:
      - delayed_on: 10ms
    on_press:
      then:
        - logger.log: "Button A pressed — refreshing display"
        - component.update: battery_mv
        - component.update: wifi_signal_db
        - component.update: m5_color_screen


  - platform: gpio
    pin:
      number: GPIO1
      inverted: true
      mode: INPUT_PULLUP
    name: "Button C"
    id: btn_c
    filters:
      - delayed_on: 10ms
    on_press:
      then:
        - logger.log: "Button C pressed"

# ── RGB LEDs ──────────────────────────────────────────────────────────────────

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO21
    num_leds: 2
    chipset: WS2812
    name: "LEDs"
    id: leds
    internal: true
    default_transition_length: 0s

# ── IR Transmitter ────────────────────────────────────────────────────────────
# Disabled: conflicts with LED strip for RMT channels. Re-enable if IR needed
# and LED strip is removed or a different LED driver is used.
# remote_transmitter:
#   pin: GPIO48
#   carrier_duty_percent: 50%
#   non_blocking: true

# ── E-Paper Display ───────────────────────────────────────────────────────────
# Panel: EL040EF1 / ED2208-DOA — E Ink Spectra 6 (7-color), 400×600, 4"
# Rotation 270° = landscape. Dimensions reported as 600×400 by driver.
# BUSY pin must be inverted: true — confirmed from Seeed reTerminal reference
# design (also Spectra-E6) and required for this panel's BUSY polarity.

display:
  - platform: epaper_spi
    id: m5_color_screen
    model: Spectra-E6
    cs_pin: GPIO44
    dc_pin: GPIO43
    busy_pin:
      number: GPIO11
      inverted: true
      mode:
        input: true
        pullup: true
    reset_pin: GPIO12
    dimensions:
      width: 400
      height: 600
    rotation: 270°
    update_interval: never
    lambda: |-
      it.fill(id(color_white));

      // ── Low battery screen ────────────────────────────────────────────────
      // Shown when battery_mv < 3450 mV at boot. Renders then device sleeps
      // indefinitely — wake via Button B after charging.
      if (id(low_battery_triggered)) {
        it.filled_rectangle(0, 0, 600, 56, id(color_red));
        it.print(300, 12, id(font_large), id(color_white), TextAlign::TOP_CENTER, "BATTERY LOW");
        it.print(300, 100, id(font_large), id(color_red), TextAlign::TOP_CENTER, "Please charge via USB-C");
        it.print(300, 180, id(icon_font), id(color_red), TextAlign::TOP_CENTER, "\U000F008E");
        if (id(battery_pct).has_state()) {
          it.printf(300, 215, id(font_small), id(color_black), TextAlign::TOP_CENTER, "%.0f%% remaining", id(battery_pct).state);
        }
        it.horizontal_line(60, 270, 480, id(color_black));
        it.print(300, 290, id(font_main), id(color_black), TextAlign::TOP_CENTER, "Device has entered deep sleep.");
        it.print(300, 325, id(font_small), id(color_black), TextAlign::TOP_CENTER, "Charge via USB-C, then press Button B to wake.");
        return;
      }

      // ── Header color — color-coded by outdoor temp if switch enabled ──────
      // Bands: blue ≤64°F, green ≤75.5°F, orange (dithered) ≤85.5°F, red >85.5°F
      // Orange is simulated via 1px red/yellow checkerboard dither — no solid orange in Spectra E6.
      // Black text on orange (light dither); white text on blue/green/red.
      bool _header_orange = false;
      Color header_color = id(color_blue);
      if (id(header_color_coded).state && id(ha_outdoor_temp).has_state()) {
        float _ot = id(ha_outdoor_temp).state;
        if      (_ot <= 64.0f)  header_color = id(color_blue);
        else if (_ot <= 75.5f)  header_color = id(color_green);
        else if (_ot <= 85.5f)  { _header_orange = true; }  // orange: drawn as red+yellow 1px dither below; header_color unused for this band
        else                    header_color = id(color_red);
      }

      // ── Header bar ────────────────────────────────────────────────────────
      if (_header_orange) {
        // 1px checkerboard dither: red + yellow → orange
        for (int _y = 0; _y < 56; _y++)
          for (int _x = 0; _x < 600; _x++)
            it.draw_pixel_at(_x, _y, ((_x + _y) % 2 == 0) ? id(color_red) : id(color_yellow));
      } else {
        it.filled_rectangle(0, 0, 600, 56, header_color);
      }
      // Orange dither is a light mix — use black text; dark headers use white
      Color header_text_color = _header_orange ? id(color_black) : id(color_white);
      it.print(300, 12, id(font_large), header_text_color, TextAlign::TOP_CENTER, "HOME ASSISTANT");


      // ── Outdoor temperature (hero — full width, centered) ────────────────
      it.print(300, 64, id(font_small), id(color_blue), TextAlign::TOP_CENTER, "OUTDOORS");
      if (id(ha_outdoor_temp).has_state()) {
        it.printf(300, 82, id(font_outdoor), id(color_black), TextAlign::TOP_CENTER, "%.0f°F", id(ha_outdoor_temp).state);
      } else {
        it.print(300, 82, id(font_main), id(color_red), TextAlign::TOP_CENTER, "Connecting...");
      }

      // ── Room temperature & humidity ───────────────────────────────────────
      it.print(300, 290, id(font_small), id(color_blue), TextAlign::TOP_CENTER, "ROOM");
      if (!isnan(id(local_temp).state) && !isnan(id(local_humidity).state)) {
        it.printf(300, 310, id(font_main), id(color_black), TextAlign::TOP_CENTER, "%.1f°F  %.0f%% RH", id(local_temp).state, id(local_humidity).state);
      } else {
        it.print(300, 310, id(font_main), id(color_red), TextAlign::TOP_CENTER, "Reading...");
      }

      // ── Divider ───────────────────────────────────────────────────────────
      it.horizontal_line(20, 348, 560, id(color_blue));

      // ── Footer: WiFi (left) · Updated (center) · Battery (right) ─────────
      // WiFi MDI icon (bottom left)
      {
        float _wsig = id(wifi_signal_db).state;
        bool _wifi_ok = !isnan(_wsig);
        const char* wifi_icon;
        Color wifi_color = id(color_black);
        if (!_wifi_ok) {
          wifi_icon = "\U0000ECFA";  // wifi-off (slashed)
          wifi_color = id(color_red);
        } else if (_wsig >= -45) {
          wifi_icon = "\U0000EB52";  // wifi (3 bars)
        } else if (_wsig >= -60) {
          wifi_icon = "\U0000EBA5";  // wifi-2 (2 bars)
        } else if (_wsig >= -75) {
          wifi_icon = "\U0000EBA4";  // wifi-1 (1 bar)
        } else {
          wifi_icon = "\U0000EBA3";  // wifi-0 (dot only)
          wifi_color = id(color_red);
        }
        it.print(20, 356, id(tabler_font), wifi_color, TextAlign::TOP_LEFT, wifi_icon);
        if (_wifi_ok) {
          float _wpct = min(max(2.0f * (_wsig + 100.0f), 0.0f), 100.0f);
          it.printf(50, 362, id(font_small), id(color_black), TextAlign::TOP_LEFT, "%.0f%%", _wpct);
        } else {
          it.print(50, 362, id(font_small), id(color_black), TextAlign::TOP_LEFT, "--");
        }
      }

      // Updated timestamp (center)
      if (id(ha_time).now().is_valid()) {
        char time_buf[32];
        id(ha_time).now().strftime(time_buf, sizeof(time_buf), "Updated %I:%M %p");
        it.print(300, 362, id(font_small), id(color_black), TextAlign::TOP_CENTER, time_buf);
      }

      // Battery icon + text (right)
      if (id(battery_pct).has_state()) {
        float pct = id(battery_pct).state;
        bool charging = id(usb_connected).state;
        Color bat_color = (charging || pct > 20) ? id(color_black) : id(color_red);
        const char* bat_icon;
        if (charging) {
          if      (pct >= 95) bat_icon = "\U000F0085";
          else if (pct >= 85) bat_icon = "\U000F008B";
          else if (pct >= 75) bat_icon = "\U000F008A";
          else if (pct >= 65) bat_icon = "\U000F089E";
          else if (pct >= 55) bat_icon = "\U000F0089";
          else if (pct >= 45) bat_icon = "\U000F089D";
          else if (pct >= 35) bat_icon = "\U000F0088";
          else if (pct >= 25) bat_icon = "\U000F0087";
          else if (pct >= 15) bat_icon = "\U000F0086";
          else                bat_icon = "\U000F089C";
        } else {
          if      (pct >= 95) bat_icon = "\U000F0079";
          else if (pct >= 85) bat_icon = "\U000F0082";
          else if (pct >= 75) bat_icon = "\U000F0081";
          else if (pct >= 65) bat_icon = "\U000F0080";
          else if (pct >= 55) bat_icon = "\U000F007F";
          else if (pct >= 45) bat_icon = "\U000F007E";
          else if (pct >= 35) bat_icon = "\U000F007D";
          else if (pct >= 25) bat_icon = "\U000F007C";
          else if (pct >= 15) bat_icon = "\U000F007B";
          else if (pct >= 5)  bat_icon = "\U000F007A";
          else                bat_icon = "\U000F008E";
        }
        it.print(510, 356, id(icon_font), bat_color, TextAlign::TOP_LEFT, bat_icon);
        if (charging) {
          it.print(540, 360, id(font_small), id(color_black), TextAlign::TOP_LEFT, "CHG");
        } else {
          it.printf(540, 360, id(font_small), id(color_black), TextAlign::TOP_LEFT, "%.0f%%", pct);
        }
      }

# ── Interval refresh (USB only) ───────────────────────────────────────────────
# When on USB power, deep sleep is prevented and the wake/sleep cycle stops.
# This interval fires every minute and triggers a refresh when the configured USB interval has elapsed.
# It's a no-op on battery because the device is asleep between refreshes.

interval:
  - interval: 1min
    then:
      - if:
          condition:
            lambda: |-
              return id(usb_connected).state &&
                     (millis() - id(last_usb_refresh_ms)) >= (uint32_t)(id(usb_refresh_mins).state * 60000.0f);
          then:
            - lambda: 'id(last_usb_refresh_ms) = millis();'
            - logger.log: "Interval refresh — USB connected"
            - component.update: battery_mv
            - component.update: wifi_signal_db
            - component.update: m5_color_screen

# ── Diagnostics ───────────────────────────────────────────────────────────────

text_sensor:
  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
    update_interval: 60s
    entity_category: diagnostic

  - platform: template
    name: "Build DateTime"
    id: build_date_sensor
    update_interval: never
    icon: "mdi:clock-outline"
    entity_category: diagnostic
    lambda: 'return {__DATE__ " " __TIME__};'

  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
    ssid:
      name: "Connected SSID"
      entity_category: diagnostic

  - platform: template
    name: "Last Reset Reason"
    id: reset_reason
    entity_category: diagnostic
    icon: "mdi:restart-alert"
    update_interval: never
    lambda: |-
      switch (esp_reset_reason()) {
        case ESP_RST_POWERON:   return {"Power On"};
        case ESP_RST_EXT:       return {"External Pin"};
        case ESP_RST_SW:        return {"Software"};
        case ESP_RST_PANIC:     return {"Panic / Exception"};
        case ESP_RST_INT_WDT:   return {"Interrupt Watchdog"};
        case ESP_RST_TASK_WDT:  return {"Task Watchdog"};
        case ESP_RST_WDT:       return {"Watchdog (other)"};
        case ESP_RST_DEEPSLEEP: return {"Deep Sleep Wake"};
        case ESP_RST_BROWNOUT:  return {"Brownout"};
        default:                return {"Unknown"};
      }

# ── Deep Sleep ────────────────────────────────────────────────────────────────
# Wake cycle: boot → M5PM1 init → WiFi → sensors → display refresh → sleep
# Button C (GPIO1) wakes the device for manual refresh or OTA updates.
# For OTA: press Button B to wake, then flash within the 60s run_duration window.

deep_sleep:
  id: deep_sleep_ctrl
  run_duration: 60s
  sleep_duration: 20min
  wakeup_pin:
    number: GPIO9
    inverted: true
