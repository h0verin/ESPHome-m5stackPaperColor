esphome:
  name: papercolor
  friendly_name: M5Stack PaperColor
  on_boot:
    # ── M5PM1 PMIC boot sequence (priority 800) ───────────────────────────────
    # The M5PM1 is a custom power management IC that controls the EPD power rail.
    # By default at power-on, the EPD rail is OFF — the display will not respond
    # to any SPI commands until the rail is enabled.
    #
    # This lambda runs at priority 800 (early boot), which is AFTER the I2C bus
    # is initialized (priority 900) but BEFORE the epaper_spi display component
    # sets up (priority 500). This ordering is critical — if the display tries to
    # initialize before the EPD rail is on, it will hang waiting for the BUSY pin.
    #
    # The register sequence below is derived from the M5Stack factory firmware HAL:
    #   https://github.com/m5stack/M5PaperColor-UserDemo/blob/main/main/hal/hal.cpp
    # and the M5GFX library source. It is equivalent to calling:
    #   pm1.pinMode(EPD_EN, OUTPUT);    // EPD_EN = M5PM1 GPIO0
    #   pm1.digitalWrite(EPD_EN, HIGH); // enable EPD power rail
    #   pm1.setChargeEnable(true);      // PWR_CFG reg 0x06 bit 0
    #   pm1.setBoostEnable(true);       // PWR_CFG reg 0x06 bit 3 — generates
    #                                   // high-voltage rails (~15V) needed for
    #                                   // e-paper pixel switching
    #
    # We use ESPHome's native I2C bus API (id(i2c_bus)) rather than Arduino Wire
    # because the combined arduino/espidf framework does not expose Wire in the
    # ESPHome lambda scope.
    #
    # M5PM1 I2C address: 0x6E. Chip ID register 0x00 must return 0x50.
    - priority: 800.0
      then:
        - lambda: |-
            delay(200);
            auto *bus = id(i2c_bus);
            const uint8_t addr = 0x6E;

            ESP_LOGI("M5PM1", "Starting M5PM1 init...");

            uint8_t reg = 0x00, chip_id = 0;
            auto write_err = bus->write(addr, &reg, 1, false);
            auto read_err = bus->read(addr, &chip_id, 1);

            ESP_LOGI("M5PM1", "Write err: %d, Read err: %d, Chip ID: 0x%02X", (int)write_err, (int)read_err, chip_id);

            if (chip_id != 0x50) {
              ESP_LOGE("M5PM1", "Unexpected chip ID: 0x%02X (expected 0x50)", chip_id);
              return;
            }

            { uint8_t d[2] = {0x0A, 0x00}; bus->write(addr, d, 2); }

            // GPIO function select — set GPIO0 and GPIO3 to plain GPIO mode (reg 0x16)
            { uint8_t r = 0x16, v = 0; bus->write(addr, &r, 1, false); bus->read(addr, &v, 1);
              uint8_t d[2] = {r, uint8_t(v & ~((1<<0) | (1<<3)))}; bus->write(addr, d, 2); }

            // GPIO direction — set GPIO0 (EPD) and GPIO3 (SD) as outputs (reg 0x10)
            { uint8_t r = 0x10, v = 0; bus->write(addr, &r, 1, false); bus->read(addr, &v, 1);
              uint8_t d[2] = {r, uint8_t(v | (1<<0) | (1<<3))}; bus->write(addr, d, 2); }

            // GPIO push-pull mode — disable open-drain on GPIO0 and GPIO3 (reg 0x13)
            { uint8_t r = 0x13, v = 0; bus->write(addr, &r, 1, false); bus->read(addr, &v, 1);
              uint8_t d[2] = {r, uint8_t(v & ~((1<<0) | (1<<3)))}; bus->write(addr, d, 2); }

            // GPIO output HIGH — enable EPD (GPIO0) and SD (GPIO3) power rails (reg 0x11)
            { uint8_t r = 0x11, v = 0; bus->write(addr, &r, 1, false); bus->read(addr, &v, 1);
              uint8_t d[2] = {r, uint8_t(v | (1<<0) | (1<<3))}; bus->write(addr, d, 2); }

            // PWR_CFG (0x06): enable charging (bit0), 5V DCDC (bit1), 3.3V LDO (bit2),
            // boost converter (bit3) — auto-clear on reset so must be set every boot
            { uint8_t r = 0x06, v = 0; bus->write(addr, &r, 1, false); bus->read(addr, &v, 1);
              uint8_t d[2] = {r, uint8_t(v | (1<<0) | (1<<1) | (1<<2) | (1<<3))}; bus->write(addr, d, 2); }
            ESP_LOGI("M5PM1", "Charge + DCDC + LDO + Boost enabled");

            // HOLD_CFG (0x07): maintain EPD (bit0), SD (bit3), and 3.3V (bit5) rails
            // on USB disconnect — without this the PMIC may reset when USB is unplugged
            { uint8_t r = 0x07, v = 0; bus->write(addr, &r, 1, false); bus->read(addr, &v, 1);
              uint8_t d[2] = {r, uint8_t(v | (1<<0) | (1<<3) | (1<<5))}; bus->write(addr, d, 2); }
            ESP_LOGI("M5PM1", "Power hold configured");

            // Button config — disable hardware reset functions on physical buttons
            // to prevent unintended resets (regs 0x49 and 0x4A)
            { uint8_t d[2] = {0x49, 0x00}; bus->write(addr, d, 2); }
            { uint8_t d[2] = {0x4A, 0x00}; bus->write(addr, d, 2); }

            delay(500);
            ESP_LOGI("M5PM1", "EPD power rail enabled");
    - priority: -100
      then:
        - light.turn_on:
            id: leds
            red: 0%
            green: 100%
            blue: 0%
            brightness: 30%
        - delay: 1s
        - light.turn_off:
            id: leds
    - priority: -200
      then:
        - delay: 25s     # display hardware init takes ~19s; wait for it to complete
        - wait_until:
            condition:
              and:
                - lambda: 'return id(ha_outdoor_temp).has_state();'
                - lambda: 'return !isnan(id(local_temp).state);'
            timeout: 60s  # give up and refresh with whatever we have after 60s
        - component.update: reset_reason
        - component.update: build_date_sensor
        - component.update: battery_mv
        - component.update: wifi_signal_db
        - if:
            condition:
              lambda: 'return id(ha_outdoor_temp).has_state();'
            then:
              - lambda: 'id(initial_display_done) = true;'
              - logger.log: "Sensors ready — marking initial display done before refresh"
        - component.update: m5_color_screen
        - if:
            condition:
              lambda: 'return id(usb_connected).state == 1.0f;'
            then:
              - logger.log: "USB connected — skipping deep sleep"
              - deep_sleep.prevent: deep_sleep_ctrl

# ── Globals ───────────────────────────────────────────────────────────────────

globals:
  - id: usb_was_connected
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: initial_display_done
    type: bool
    restore_value: false
    initial_value: 'false'

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

psram:
  mode: octal
  speed: 80MHz

logger:
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret papercolor_api_key

ota:
  - platform: esphome
    password: !secret papercolor_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # use_address: 192.168.3.x  # Uncomment and set to your device's reserved/static IP
                               # Improves OTA reliability by bypassing mDNS resolution
  ap:
    ssid: "PaperColor Fallback"
    password: !secret papercolor_ap_password

captive_portal:

# ── Time ──────────────────────────────────────────────────────────────────────

time:
  - platform: homeassistant
    id: ha_time
    timezone: "America/Los_Angeles"

# ── I2C ───────────────────────────────────────────────────────────────────────
# SDA=GPIO3, SCL=GPIO2 confirmed from M5GFX source and factory firmware hal.h
# GPIO3 is a strapping pin — warning is expected and safe to ignore on this hardware

i2c:
  sda: GPIO3
  scl: GPIO2
  frequency: 100000
  scan: true
  id: i2c_bus

# ── SPI (e-paper display) ─────────────────────────────────────────────────────

spi:
  clk_pin: GPIO15
  mosi_pin: GPIO13

# ── Colors ────────────────────────────────────────────────────────────────────

color:
  - id: color_black
    red: 0%
    green: 0%
    blue: 0%
  - id: color_white
    red: 100%
    green: 100%
    blue: 100%
  - id: color_red
    red: 100%
    green: 0%
    blue: 0%
  - id: color_blue
    red: 0%
    green: 0%
    blue: 100%
  - id: color_green
    red: 0%
    green: 100%
    blue: 0%
  - id: color_yellow
    red: 100%
    green: 100%
    blue: 0%
  - id: color_orange
    red: 100%
    green: 45%
    blue: 0%

# ── Fonts ─────────────────────────────────────────────────────────────────────

font:
  - file: "gfonts://Ubuntu"
    id: font_large
    size: 32
  - file: "gfonts://Ubuntu"
    id: font_main
    size: 24
  - file: "gfonts://Ubuntu"
    id: font_small
    size: 18
  - file: "gfonts://Ubuntu"
    id: font_outdoor
    size: 144

  # MDI icon font — battery icons for header display
  - file: "https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: icon_font
    size: 26
    glyphs:
      - "\U000F0079"  # battery (100%)
      - "\U000F0082"  # battery-90
      - "\U000F0081"  # battery-80
      - "\U000F0080"  # battery-70
      - "\U000F007F"  # battery-60
      - "\U000F007E"  # battery-50
      - "\U000F007D"  # battery-40
      - "\U000F007C"  # battery-30
      - "\U000F007B"  # battery-20
      - "\U000F007A"  # battery-10
      - "\U000F008E"  # battery-outline (0%)
      - "\U000F0085"  # battery-charging-100
      - "\U000F008B"  # battery-charging-90
      - "\U000F008A"  # battery-charging-80
      - "\U000F089E"  # battery-charging-70
      - "\U000F0089"  # battery-charging-60
      - "\U000F089D"  # battery-charging-50
      - "\U000F0088"  # battery-charging-40
      - "\U000F0087"  # battery-charging-30
      - "\U000F0086"  # battery-charging-20
      - "\U000F089C"  # battery-charging-10

# ── Sensors ───────────────────────────────────────────────────────────────────

sensor:
  - platform: sht4x
    temperature:
      name: "Room Temperature"
      id: local_temp
    humidity:
      name: "Room Humidity"
      id: local_humidity
    address: 0x44
    update_interval: 15s

  - platform: template
    name: "Battery Voltage"
    id: battery_mv
    unit_of_measurement: "mV"
    accuracy_decimals: 0
    device_class: voltage
    state_class: measurement
    entity_category: diagnostic
    update_interval: never
    lambda: |-
      // Read VBAT from M5PM1 register 0x22 (16-bit little-endian, value in mV)
      // Take 5 readings and return median to reject ADC glitches
      auto *bus = id(i2c_bus);
      const uint8_t addr = 0x6E;
      uint16_t readings[5];
      for (int i = 0; i < 5; i++) {
        uint8_t reg = 0x22;
        uint8_t data[2] = {0, 0};
        bus->write(addr, &reg, 1, false);
        bus->read(addr, data, 2);
        readings[i] = data[0] | (data[1] << 8);
        delay(10);
      }
      // Sort and return median (index 2)
      for (int i = 0; i < 4; i++)
        for (int j = i+1; j < 5; j++)
          if (readings[i] > readings[j]) { uint16_t t = readings[i]; readings[i] = readings[j]; readings[j] = t; }
      uint16_t mv = readings[2];
      if (mv < 3000) return {};  // reject invalid readings
      return (float)mv;

  - platform: template
    name: "USB Connected"
    id: usb_connected
    unit_of_measurement: ""
    accuracy_decimals: 0
    entity_category: diagnostic
    update_interval: 10s
    lambda: |-
      // Read VIN from M5PM1 register 0x24 (16-bit little-endian, value in mV)
      // VIN > 4000mV indicates USB power is present
      auto *bus = id(i2c_bus);
      const uint8_t addr = 0x6E;
      uint8_t reg = 0x24;
      uint8_t data[2] = {0, 0};
      bus->write(addr, &reg, 1, false);
      bus->read(addr, data, 2);
      uint16_t vin = data[0] | (data[1] << 8);
      return (float)(vin > 4000 ? 1 : 0);
    on_value:
      then:
        - if:
            condition:
              lambda: 'return (x == 1.0f) != id(usb_was_connected);'
            then:
              - lambda: 'id(usb_was_connected) = (x == 1.0f);'
              - lambda: |-
                  if (x == 1.0f) ESP_LOGI("USB", "USB connected — refreshing display");
                  else           ESP_LOGI("USB", "USB disconnected — refreshing display");
              - if:
                  condition:
                    lambda: 'return id(initial_display_done);'
                  then:
                    - component.update: battery_mv
                    - component.update: wifi_signal_db
                    - component.update: m5_color_screen

  - platform: copy
    source_id: battery_mv
    name: "Battery"
    id: battery_pct
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery
    state_class: measurement
    # Piecewise linear approximation of LiPo discharge curve for 1S 1250mAh cell.
    # Calibration points derived from actual discharge data on this device.
    # Tune by noting mV readings at known states and updating points below, then OTA flash.
    # Key points still to refine: bottom end (let battery run low to calibrate 0-15% range).
    filters:
      - calibrate_linear:
          - 3000 -> 0
          - 3300 -> 5
          - 3600 -> 15
          - 3700 -> 30
          - 3800 -> 50
          - 3950 -> 70
          - 4100 -> 90
          - 4200 -> 100
      - clamp:
          min_value: 0
          max_value: 100

  - platform: homeassistant
    id: ha_outdoor_temp
    entity_id: sensor.st_00105004_temperature
    on_value:
      then:
        - if:
            condition:
              # Only trigger if display init is done (>25s) and initial render didn't have data
              lambda: 'return !id(initial_display_done) && millis() > 25000;'
            then:
              - lambda: 'id(initial_display_done) = true;'
              - logger.log: "Outdoor temp arrived after timeout — refreshing display"
              - component.update: battery_mv
              - component.update: wifi_signal_db
              - component.update: m5_color_screen

  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 600s
    entity_category: diagnostic

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: diagnostic
    device_class: ""

  - platform: uptime
    name: "Uptime"
    update_interval: 60s
    entity_category: diagnostic

# ── Buttons ───────────────────────────────────────────────────────────────────
# Physical order left to right: A=GPIO10, B=GPIO9, C=GPIO1
# Button A: manual display refresh (useful for a second refresh within the wake window)
# Button B: wake pin — wakes device from deep sleep, triggers auto refresh + 90s OTA window
# Button C: available for future use

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO10
      inverted: true
      mode: INPUT_PULLUP
    name: "Button A"
    id: btn_a
    filters:
      - delayed_on: 10ms
    on_press:
      then:
        - logger.log: "Button A pressed — refreshing display"
        - component.update: usb_connected
        - component.update: battery_mv
        - component.update: wifi_signal_db
        - component.update: m5_color_screen


  - platform: gpio
    pin:
      number: GPIO1
      inverted: true
      mode: INPUT_PULLUP
    name: "Button C"
    id: btn_c
    filters:
      - delayed_on: 10ms
    on_press:
      then:
        - logger.log: "Button C pressed"

# ── RGB LEDs ──────────────────────────────────────────────────────────────────

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO21
    num_leds: 2
    chipset: WS2812
    name: "LEDs"
    id: leds
    default_transition_length: 0s

# ── IR Transmitter ────────────────────────────────────────────────────────────
# Disabled: conflicts with LED strip for RMT channels. Re-enable if IR needed
# and LED strip is removed or a different LED driver is used.
# remote_transmitter:
#   pin: GPIO48
#   carrier_duty_percent: 50%
#   non_blocking: true

# ── E-Paper Display ───────────────────────────────────────────────────────────
# Panel: EL040EF1 / ED2208-DOA — E Ink Spectra 6 (7-color), 400×600, 4"
# Rotation 270° = landscape. Dimensions reported as 600×400 by driver.
# BUSY pin must be inverted: true — confirmed from Seeed reTerminal reference
# design (also Spectra-E6) and required for this panel's BUSY polarity.

display:
  - platform: epaper_spi
    id: m5_color_screen
    model: Spectra-E6
    cs_pin: GPIO44
    dc_pin: GPIO43
    busy_pin:
      number: GPIO11
      inverted: true
      mode:
        input: true
        pullup: true
    reset_pin: GPIO12
    dimensions:
      width: 400
      height: 600
    rotation: 270°
    update_interval: never
    lambda: |-
      it.fill(id(color_white));

      // ── Header bar ────────────────────────────────────────────────────────
      it.filled_rectangle(0, 0, 600, 56, id(color_blue));
      it.print(300, 12, id(font_large), id(color_white), TextAlign::TOP_CENTER, "HOME ASSISTANT");

      // ── WiFi arc icon (top left of header, white) ────────────────────────
      // Pie-slice style, cx=60 cy=30 — mirrors battery indent from right edge.
      // Arcs fan upward and fit within the 56px blue header.
      {
        float _wsig = id(wifi_signal_db).state;
        bool _wifi_ok = !isnan(_wsig);
        int _wlevel = 0;
        if (_wifi_ok) {
          if      (_wsig >= -45) _wlevel = 3;
          else if (_wsig >= -60) _wlevel = 2;
          else if (_wsig >= -75) _wlevel = 1;
        }
        const int cx = 38, cy = 37;
        Color _wc1 = (_wlevel >= 1) ? id(color_white) : id(color_blue);
        Color _wc2 = (_wlevel >= 2) ? id(color_white) : id(color_blue);
        Color _wc3 = (_wlevel >= 3) ? id(color_white) : id(color_blue);
        // Base dot
        it.filled_circle(cx, cy, 3, id(color_white));
        // Ring 1
        it.line(cx+4, cy-4, cx+2, cy-6, _wc1); it.line(cx+2, cy-6, cx, cy-7, _wc1);
        it.line(cx, cy-7, cx-2, cy-6, _wc1); it.line(cx-2, cy-6, cx-4, cy-4, _wc1);
        it.line(cx+5, cy-4, cx+2, cy-7, _wc1); it.line(cx+2, cy-7, cx, cy-8, _wc1);
        it.line(cx, cy-8, cx-2, cy-7, _wc1); it.line(cx-2, cy-7, cx-5, cy-4, _wc1);
        // Ring 2
        it.line(cx+7, cy-6, cx+4, cy-9, _wc2); it.line(cx+4, cy-9, cx, cy-11, _wc2);
        it.line(cx, cy-11, cx-4, cy-9, _wc2); it.line(cx-4, cy-9, cx-7, cy-6, _wc2);
        it.line(cx+8, cy-5, cx+4, cy-10, _wc2); it.line(cx+4, cy-10, cx, cy-12, _wc2);
        it.line(cx, cy-12, cx-4, cy-10, _wc2); it.line(cx-4, cy-10, cx-8, cy-5, _wc2);
        // Ring 3
        it.line(cx+11, cy-7, cx+6, cy-13, _wc3); it.line(cx+6, cy-13, cx, cy-16, _wc3);
        it.line(cx, cy-16, cx-6, cy-13, _wc3); it.line(cx-6, cy-13, cx-11, cy-7, _wc3);
        it.line(cx+11, cy-6, cx+6, cy-14, _wc3); it.line(cx+6, cy-14, cx, cy-17, _wc3);
        it.line(cx, cy-17, cx-6, cy-14, _wc3); it.line(cx-6, cy-14, cx-11, cy-6, _wc3);
        // No-WiFi slash
        if (!_wifi_ok || _wlevel == 0) {
          it.line(cx-8, cy-16, cx+8, cy, id(color_blue));
          it.line(cx-6, cy-16, cx+10, cy, id(color_blue));
          it.line(cx-7, cy-16, cx+7, cy-1, id(color_red));
          it.line(cx-6, cy-16, cx+8, cy-1, id(color_red));
          it.line(cx-5, cy-16, cx+9, cy-1, id(color_red));
        }
      }

      // ── Battery (top right of header, simple) ────────────────────────────
      if (id(battery_pct).has_state()) {
        float pct = id(battery_pct).state;
        bool charging = id(usb_connected).state == 1.0f;
        Color bat_color = charging ? id(color_white) :
                          (pct > 50) ? id(color_white) :
                          (pct > 20) ? id(color_yellow) : id(color_red);
        const char* bat_icon;
        if (charging) {
          if      (pct >= 95) bat_icon = "\U000F0085";
          else if (pct >= 85) bat_icon = "\U000F008B";
          else if (pct >= 75) bat_icon = "\U000F008A";
          else if (pct >= 65) bat_icon = "\U000F089E";
          else if (pct >= 55) bat_icon = "\U000F0089";
          else if (pct >= 45) bat_icon = "\U000F089D";
          else if (pct >= 35) bat_icon = "\U000F0088";
          else if (pct >= 25) bat_icon = "\U000F0087";
          else if (pct >= 15) bat_icon = "\U000F0086";
          else                bat_icon = "\U000F089C";
        } else {
          if      (pct >= 95) bat_icon = "\U000F0079";
          else if (pct >= 85) bat_icon = "\U000F0082";
          else if (pct >= 75) bat_icon = "\U000F0081";
          else if (pct >= 65) bat_icon = "\U000F0080";
          else if (pct >= 55) bat_icon = "\U000F007F";
          else if (pct >= 45) bat_icon = "\U000F007E";
          else if (pct >= 35) bat_icon = "\U000F007D";
          else if (pct >= 25) bat_icon = "\U000F007C";
          else if (pct >= 15) bat_icon = "\U000F007B";
          else if (pct >= 5)  bat_icon = "\U000F007A";
          else                bat_icon = "\U000F008E";
        }
        it.print(510, 15, id(icon_font), bat_color, TextAlign::TOP_LEFT, bat_icon);
        if (charging) {
          it.print(540, 20, id(font_small), bat_color, TextAlign::TOP_LEFT, "CHG");
        } else {
          it.printf(540, 20, id(font_small), bat_color, TextAlign::TOP_LEFT, "%.0f%%", pct);
        }
      }

      // ── Outdoor temperature (hero — full width, centered) ────────────────
      it.print(300, 64, id(font_small), id(color_blue), TextAlign::TOP_CENTER, "OUTDOORS");
      if (id(ha_outdoor_temp).has_state()) {
        it.printf(300, 82, id(font_outdoor), id(color_black), TextAlign::TOP_CENTER, "%.0f°F", id(ha_outdoor_temp).state);
      } else {
        it.print(300, 82, id(font_main), id(color_red), TextAlign::TOP_CENTER, "Connecting...");
      }

      // ── Room temperature & humidity ───────────────────────────────────────
      it.print(20, 290, id(font_small), id(color_blue), "ROOM");
      if (!isnan(id(local_temp).state) && !isnan(id(local_humidity).state)) {
        it.printf(20, 310, id(font_main), id(color_black), "%.1f°F  %.0f%% RH", id(local_temp).state, id(local_humidity).state);
      } else {
        it.print(20, 310, id(font_main), id(color_red), "Reading...");
      }

      // ── Divider ───────────────────────────────────────────────────────────
      it.horizontal_line(20, 348, 560, id(color_blue));

      // ── Last update time ──────────────────────────────────────────────────
      if (id(ha_time).now().is_valid()) {
        char time_buf[32];
        id(ha_time).now().strftime(time_buf, sizeof(time_buf), "Updated %I:%M %p");
        it.print(300, 362, id(font_small), id(color_black), TextAlign::TOP_CENTER, time_buf);
      }

# ── Interval refresh (USB only) ───────────────────────────────────────────────
# When on USB power, deep sleep is prevented and the wake/sleep cycle stops.
# This interval fires every 15 minutes to keep the display current.
# It's a no-op on battery because the device is asleep between refreshes.

interval:
  - interval: 10min
    then:
      - if:
          condition:
            lambda: 'return id(usb_connected).state == 1.0f;'
          then:
            - logger.log: "Interval refresh — USB connected"
            - component.update: battery_mv
            - component.update: wifi_signal_db
            - component.update: m5_color_screen

# ── Diagnostics ───────────────────────────────────────────────────────────────

text_sensor:
  - platform: template
    name: "Build DateTime"
    id: build_date_sensor
    update_interval: never
    icon: "mdi:clock-outline"
    entity_category: diagnostic
    lambda: 'return {__DATE__ " " __TIME__};'

  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
    ssid:
      name: "Connected SSID"
      entity_category: diagnostic

  - platform: template
    name: "Last Reset Reason"
    id: reset_reason
    entity_category: diagnostic
    icon: "mdi:restart-alert"
    update_interval: never
    lambda: |-
      switch (esp_reset_reason()) {
        case ESP_RST_POWERON:   return {"Power On"};
        case ESP_RST_EXT:       return {"External Pin"};
        case ESP_RST_SW:        return {"Software"};
        case ESP_RST_PANIC:     return {"Panic / Exception"};
        case ESP_RST_INT_WDT:   return {"Interrupt Watchdog"};
        case ESP_RST_TASK_WDT:  return {"Task Watchdog"};
        case ESP_RST_WDT:       return {"Watchdog (other)"};
        case ESP_RST_DEEPSLEEP: return {"Deep Sleep Wake"};
        case ESP_RST_BROWNOUT:  return {"Brownout"};
        default:                return {"Unknown"};
      }

# ── Deep Sleep ────────────────────────────────────────────────────────────────
# Wake cycle: boot → M5PM1 init → WiFi → sensors → display refresh → sleep
# Button C (GPIO1) wakes the device for manual refresh or OTA updates.
# For OTA: press Button B to wake, then flash within the 90s run_duration window.

deep_sleep:
  id: deep_sleep_ctrl
  run_duration: 60s
  sleep_duration: 15min
  wakeup_pin:
    number: GPIO9
    inverted: true
